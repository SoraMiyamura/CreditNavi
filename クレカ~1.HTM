<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クレカ乗車運賃ナビ - iOS Prototype</title>
<style>
  :root{
    --blue:#007AFF; --green:#34C759; --red:#FF3B30; --orange:#FF9500;
    --gray:#8E8E93; --gray2:#AEAEB2; --gray3:#C7C7CC;
    --bg:#F2F2F7; --card:#FFFFFF;
    --sep:rgba(60,60,67,0.29);
    --label:#000; --label2:rgba(60,60,67,0.6); --label3:rgba(60,60,67,0.3);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    letter-spacing:-0.4px;
  }
  /* ============ app container (full window) ============ */
  #app{position:fixed;inset:0;background:var(--bg);overflow:hidden;}
  /* ============ screens ============ */
  .screen{
    position:absolute;inset:0;background:var(--bg);
    display:flex;flex-direction:column;visibility:hidden;
  }
  .screen.root-active{visibility:visible;}
  .screen.pushed{
    transform:translateX(100%);visibility:visible;z-index:100;
    transition:transform .35s cubic-bezier(.25,.1,.25,1);
    box-shadow:-8px 0 24px rgba(0,0,0,.12);
  }
  .screen.pushed.in{transform:translateX(0);}
  @media (prefers-reduced-motion:reduce){
    .screen.pushed{transition:none;}
  }
  .scroll{
    flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:0 max(16px,calc((100% - 640px)/2)) 110px max(16px,calc((100% - 640px)/2));
  }
  /* ============ nav bars ============ */
  .navbar-large{padding:16px 16px 0 16px;}
  .large-title{font-size:34px;font-weight:700;color:var(--label);padding:8px 0 12px 0;letter-spacing:0.2px;}
  .navbar{
    position:absolute;top:0;left:0;right:0;height:52px;z-index:200;
    background:rgba(242,242,247,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    display:flex;align-items:flex-end;justify-content:center;
    padding-bottom:14px;border-bottom:0.5px solid var(--sep);
  }
  .navbar .nav-title{font-size:17px;font-weight:600;color:var(--label);}
  .navbar .back{
    position:absolute;left:8px;bottom:7px;display:flex;align-items:center;
    color:var(--blue);font-size:17px;border:none;background:none;cursor:pointer;
    font-family:inherit;letter-spacing:-0.4px;padding:4px 8px;
  }
  .navbar .back svg{margin-right:3px;}
  .navbar .back:active{opacity:.4;}
  .pushed-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:68px max(16px,calc((100% - 640px)/2)) 60px max(16px,calc((100% - 640px)/2));}
  /* mini title that appears on scroll (search screen) */
  .mini-nav{
    position:absolute;top:0;left:0;right:0;height:52px;z-index:150;
    background:rgba(242,242,247,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:14px;
    border-bottom:0.5px solid var(--sep);opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .mini-nav.show{opacity:1;}
  .mini-nav .nav-title{font-size:17px;font-weight:600;}
  /* ============ inset grouped list ============ */
  .section-header{
    font-size:13px;color:var(--label2);text-transform:none;
    padding:20px 16px 7px 16px;font-weight:400;
  }
  .group{background:var(--card);border-radius:10px;overflow:hidden;}
  .cell{
    display:flex;align-items:center;min-height:44px;padding:11px 16px;
    position:relative;background:var(--card);cursor:pointer;border:none;width:100%;
    font-family:inherit;text-align:left;font-size:17px;color:var(--label);letter-spacing:-0.4px;
  }
  .cell:active{background:#D1D1D6;}
  .cell:not(:last-child)::after{
    content:"";position:absolute;left:16px;right:0;bottom:0;height:0.5px;background:var(--sep);
  }
  .cell .chevron{margin-left:auto;flex-shrink:0;}
  .footnote{font-size:13px;color:var(--label2);padding:7px 16px 0 16px;line-height:1.45;}
  /* ============ search form ============ */
  .route-input-card{background:var(--card);border-radius:12px;padding:6px 16px;position:relative;}
  .station-row{display:flex;align-items:center;min-height:52px;cursor:pointer;}
  .station-row:first-child{border-bottom:0.5px solid var(--sep);}
  .station-row:active{opacity:.5;}
  .st-badge{
    width:46px;padding:4px 0;border-radius:6px;color:#fff;font-size:13px;font-weight:600;
    text-align:center;flex-shrink:0;margin-right:12px;letter-spacing:0;
  }
  .st-badge.dep{background:var(--blue);}
  .st-badge.arr{background:var(--green);}
  .station-name{font-size:17px;color:var(--label);}
  .station-name.placeholder{color:var(--label3);}
  .swap-btn{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    width:34px;height:34px;border-radius:50%;background:var(--bg);border:none;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .swap-btn:active{opacity:.4;}
  .primary-btn{
    display:block;width:100%;margin-top:14px;background:var(--blue);color:#fff;
    font-size:17px;font-weight:600;border:none;border-radius:12px;padding:15px;
    cursor:pointer;font-family:inherit;letter-spacing:-0.4px;transition:opacity .15s;
  }
  .primary-btn:active{opacity:.4;}
  .primary-btn:disabled{background:var(--gray3);cursor:default;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;}
  .chip{
    background:rgba(0,122,255,.12);color:var(--blue);border:none;border-radius:16px;
    padding:7px 13px;font-size:13px;font-family:inherit;cursor:pointer;letter-spacing:-0.2px;
  }
  .chip:active{opacity:.4;}
  /* selected card banner on search screen */
  .card-banner{
    display:flex;align-items:center;background:var(--card);border-radius:12px;
    padding:12px 16px;margin-top:24px;cursor:pointer;
  }
  .card-banner:active{opacity:.6;}
  .card-chip-icon{
    width:42px;height:28px;border-radius:5px;flex-shrink:0;margin-right:12px;
    background:linear-gradient(135deg,#0b5c3e,#12855a);position:relative;
  }
  .card-chip-icon::after{
    content:"";position:absolute;left:6px;top:9px;width:10px;height:8px;border-radius:2px;background:rgba(255,215,130,.9);
  }
  /* ============ route result cards ============ */
  .route-card{
    background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:12px;
    cursor:pointer;border:none;width:100%;text-align:left;font-family:inherit;display:block;
  }
  .route-card:active{background:#E5E5EA;}
  .route-card .rc-top{display:flex;align-items:baseline;justify-content:space-between;}
  .rc-via{font-size:14px;color:var(--label);letter-spacing:-0.3px;flex:1;line-height:1.7;}
  .line-badge{
    display:inline-block;font-size:11px;font-weight:700;color:#fff;border-radius:4px;
    padding:1px 5px;margin-right:3px;letter-spacing:0;
  }
  .via-line{font-weight:300;}
  .via-sta{font-weight:600;}
  .via-arrow{color:var(--label2);font-weight:300;}
  .rc-fares{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .fare-pill{font-size:15px;padding:6px 11px;border-radius:7px;background:var(--bg);color:var(--label2);}
  .fare-pill b{color:var(--label);font-weight:600;}
  .fare-pill.cc{background:rgba(0,122,255,.12);color:var(--blue);}
  .fare-pill.cc b{color:var(--blue);}
  .rc-best{margin-top:10px;font-size:13px;line-height:1.5;}
  .rc-best .rb-actual{color:var(--label2);font-weight:600;}
  .rc-best .rb-net{font-weight:600;display:flex;align-items:center;gap:5px;}
  .rc-best .rb-net.good{color:var(--green);}
  .rc-best .rb-net.bad{color:var(--orange);}
  /* ============ detail fare rows ============ */
  .fare-row{padding:13px 16px;position:relative;background:var(--card);}
  .fare-row:not(:last-child)::after{content:"";position:absolute;left:16px;right:0;bottom:0;height:0.5px;background:var(--sep);}
  .fare-row .fr-line{display:flex;align-items:baseline;justify-content:space-between;}
  .fr-name{font-size:17px;color:var(--label);}
  .fr-amount{font-size:20px;font-weight:600;color:var(--label);font-variant-numeric:tabular-nums;}
  .fare-row.cc-row{background:rgba(0,122,255,.06);}
  .fare-row.cc-row .fr-name{color:var(--blue);font-weight:600;}
  .fare-row.cc-row .fr-amount{color:var(--blue);}
  .pt-line{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:14px;color:var(--green);font-weight:600;}
  .pt-sub{font-size:12px;color:var(--label2);font-weight:400;margin-left:2px;}
  .net-line{margin-top:4px;font-size:13px;color:var(--label2);}
  .net-line b{color:var(--label);font-weight:600;}
  .verdict{
    border-radius:12px;padding:13px 16px;margin-bottom:4px;display:flex;align-items:center;gap:10px;
  }
  .verdict.good{background:rgba(52,199,89,.14);}
  .verdict.bad{background:rgba(255,149,0,.14);}
  .verdict .v-text{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
  .verdict.good .v-text{color:#1d7c3a;}
  .verdict.bad .v-text{color:#b36a00;}
  .verdict .v-sub{font-size:12px;font-weight:400;color:var(--label2);display:block;margin-top:1px;}
  .leg-cell{display:flex;align-items:center;min-height:44px;padding:10px 16px;position:relative;background:var(--card);}
  .leg-cell:not(:last-child)::after{content:"";position:absolute;left:16px;right:0;bottom:0;height:0.5px;background:var(--sep);}
  .op-badge{font-size:11px;font-weight:600;color:#fff;border-radius:4px;padding:2px 6px;margin-right:10px;flex-shrink:0;}
  .leg-sec{font-size:15px;color:var(--label);flex:1;}
  .leg-fare{font-size:15px;color:var(--label2);font-variant-numeric:tabular-nums;}
  /* ============ tab bar ============ */
  .tabbar{
    position:absolute;bottom:0;left:0;right:0;height:64px;z-index:500;
    background:rgba(249,249,249,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:0.5px solid var(--sep);display:flex;justify-content:center;padding-top:7px;
  }
  .tab{
    flex:1;max-width:180px;display:flex;flex-direction:column;align-items:center;gap:3px;
    border:none;background:none;cursor:pointer;font-family:inherit;color:var(--gray);
  }
  .tab .tab-label{font-size:10px;letter-spacing:0;}
  .tab.active{color:var(--blue);}
  .tab:active{opacity:.6;}
  /* ============ sheet (station picker) ============ */
  .dim{
    position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:800;opacity:0;
    transition:opacity .3s;pointer-events:none;
  }
  .dim.show{opacity:1;pointer-events:auto;}
  .sheet{
    position:absolute;left:0;right:0;bottom:0;height:72%;z-index:900;
    max-width:680px;margin:0 auto;
    background:var(--bg);border-radius:16px 16px 0 0;
    transform:translateY(105%);transition:transform .35s cubic-bezier(.25,.1,.25,1);
    display:flex;flex-direction:column;
    box-shadow:0 -6px 30px rgba(0,0,0,.15);
  }
  .sheet.show{transform:translateY(0);}
  .grabber{width:36px;height:5px;background:var(--gray3);border-radius:3px;margin:8px auto 4px auto;flex-shrink:0;}
  .sheet-title{text-align:center;font-size:17px;font-weight:600;padding:8px 0 12px 0;}
  .searchbar{
    margin:0 16px 12px 16px;background:rgba(118,118,128,.12);border-radius:10px;
    display:flex;align-items:center;padding:8px 10px;gap:7px;flex-shrink:0;
  }
  .searchbar input{
    border:none;background:none;outline:none;font-size:17px;font-family:inherit;
    flex:1;color:var(--label);letter-spacing:-0.4px;
  }
  .searchbar input::placeholder{color:rgba(60,60,67,.6);}
  .sheet-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 40px 16px;}
  .st-cell{display:flex;align-items:center;gap:12px;}
  .st-lines{font-size:12px;color:var(--label2);margin-top:2px;}
  /* ============ alert ============ */
  .alert-wrap{
    position:absolute;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.4);
  }
  .alert-wrap.show{display:flex;}
  .alert{
    width:270px;background:rgba(249,249,249,.97);backdrop-filter:blur(20px);
    border-radius:14px;overflow:hidden;text-align:center;
    animation:alertPop .25s cubic-bezier(.2,1.2,.4,1);
  }
  @keyframes alertPop{from{transform:scale(1.15);opacity:0;}to{transform:scale(1);opacity:1;}}
  .alert .a-title{font-size:17px;font-weight:600;padding:19px 16px 4px 16px;}
  .alert .a-msg{font-size:13px;color:var(--label);padding:0 16px 16px 16px;line-height:1.4;}
  .alert input{
    margin:0 16px 16px 16px;width:calc(100% - 32px);padding:7px 8px;font-size:14px;
    border:0.5px solid var(--gray3);border-radius:7px;font-family:inherit;outline:none;background:#fff;
  }
  .alert .a-btns{display:flex;border-top:0.5px solid var(--sep);}
  .alert .a-btn{
    flex:1;padding:12px;font-size:17px;color:var(--blue);border:none;background:none;
    cursor:pointer;font-family:inherit;
  }
  .alert .a-btn:not(:last-child){border-right:0.5px solid var(--sep);}
  .alert .a-btn.bold{font-weight:600;}
  .alert .a-btn:active{background:rgba(0,0,0,.06);}
  /* ============ history / empty state ============ */
  .empty{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:90px 40px 0 40px;text-align:center;color:var(--label2);
  }
  .empty .e-title{font-size:20px;font-weight:600;color:var(--label);margin:16px 0 6px 0;}
  .empty .e-msg{font-size:15px;line-height:1.5;}
  .hist-main{font-size:16px;font-weight:600;color:var(--label);}
  .hist-sub{font-size:13px;color:var(--label2);margin-top:2px;}
  .hist-pt{margin-left:auto;text-align:right;flex-shrink:0;}
  .hist-fare{font-size:15px;font-weight:600;color:var(--blue);font-variant-numeric:tabular-nums;}
  .hist-ptv{font-size:12px;color:var(--green);font-weight:600;}
  /* card list */
  .card-icon{width:38px;height:25px;border-radius:4px;flex-shrink:0;margin-right:12px;}
  .rate-badge{margin-left:auto;font-size:14px;color:var(--label2);display:flex;align-items:center;gap:8px;}
</style>
</head>
<body>
<div id="app">

    <!-- =============== SEARCH (root tab 0) =============== -->
    <div class="screen root-active" id="scr-search">
      <div class="mini-nav" id="search-mini"><div class="nav-title">運賃ナビ</div></div>
      <div class="scroll" id="search-scroll" style="padding-top:0;">
        <div class="navbar-large">
          <div class="large-title">運賃ナビ</div>
        </div>
        <div class="route-input-card">
          <div class="station-row" onclick="openPicker('from')">
            <div class="st-badge dep">出発</div>
            <div class="station-name placeholder" id="from-label">出発駅</div>
          </div>
          <div class="station-row" onclick="openPicker('to')">
            <div class="st-badge arr">到着</div>
            <div class="station-name placeholder" id="to-label">到着駅</div>
          </div>
          <button class="swap-btn" onclick="swapStations(event)" aria-label="入れ替え">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M5 2 L5 11 M2.5 8.5 L5 11 L7.5 8.5" stroke="#007AFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 14 L11 5 M8.5 7.5 L11 5 L13.5 7.5" stroke="#007AFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <button class="primary-btn" id="search-btn" disabled onclick="doSearch()">経路を検索</button>

        <div class="section-header">対応区間の例</div>
        <div class="chips">
          <button class="chip" onclick="quickSet('三軒茶屋','表参道')">三軒茶屋 → 表参道</button>
          <button class="chip" onclick="quickSet('九段下','白金高輪')">九段下 → 白金高輪</button>
          <button class="chip" onclick="quickSet('綾瀬','羽沢横浜国大')">綾瀬 → 羽沢横浜国大</button>
          <button class="chip" onclick="quickSet('志村坂上','日吉')">志村坂上 → 日吉</button>
        </div>

        <div class="section-header">ポイント計算に使うカード</div>
        <div class="card-banner" onclick="switchTab(2)">
          <div class="card-chip-icon" id="banner-card-icon"></div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:600;" id="banner-card-name">三井住友カード（NL）</div>
            <div style="font-size:13px;color:var(--label2);" id="banner-card-rate">タッチ決済乗車 8%還元</div>
          </div>
          <svg class="chevron" width="8" height="14" viewBox="0 0 8 14"><path d="M1 1 L7 7 L1 13" stroke="#C7C7CC" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="footnote">クレカ乗車運賃は10円単位きっぷ運賃の社局合算（メトロ⇔都営70円割引のみ適用）による推定値です。みなし経路の公式仕様は非公開のため、実際の請求額と異なる場合があります。</div>
      </div>
    </div>

    <!-- =============== HISTORY (root tab 1) =============== -->
    <div class="screen" id="scr-history">
      <div class="scroll" style="padding-top:0;">
        <div class="navbar-large"><div class="large-title">検索履歴</div></div>
        <div id="history-content"></div>
      </div>
    </div>

    <!-- =============== CARDS (root tab 2) =============== -->
    <div class="screen" id="scr-cards">
      <div class="scroll" style="padding-top:0;">
        <div class="navbar-large"><div class="large-title">マイカード</div></div>
        <div class="section-header">ポイント計算に使用するカード</div>
        <div class="group" id="card-list"></div>
        <div class="footnote">還元率は例示です。各社キャンペーンの還元率・上限は変更される場合があります。獲得ポイントは「クレカ乗車運賃 × 還元率」で計算します。</div>
        <div class="section-header">カスタム</div>
        <div class="group">
          <button class="cell" onclick="openCustomRate()">
            <span style="color:var(--blue);">還元率を自分で入力…</span>
          </button>
        </div>
      </div>
    </div>

    <!-- =============== RESULTS (pushed) =============== -->
    <div class="screen pushed" id="scr-results">
      <div class="navbar">
        <button class="back" onclick="popScreen('scr-results')">
          <svg width="12" height="20" viewBox="0 0 12 20"><path d="M10 2 L3 10 L10 18" stroke="#007AFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          検索
        </button>
        <div class="nav-title" id="results-title">経路候補</div>
      </div>
      <div class="pushed-scroll" id="results-body"></div>
    </div>

    <!-- =============== DETAIL (pushed) =============== -->
    <div class="screen pushed" id="scr-detail">
      <div class="navbar">
        <button class="back" onclick="popScreen('scr-detail')">
          <svg width="12" height="20" viewBox="0 0 12 20"><path d="M10 2 L3 10 L10 18" stroke="#007AFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          経路候補
        </button>
        <div class="nav-title">運賃の内訳</div>
      </div>
      <div class="pushed-scroll" id="detail-body"></div>
    </div>

    <!-- =============== tab bar =============== -->
    <div class="tabbar" id="tabbar">
      <button class="tab active" onclick="switchTab(0)" id="tab-0">
        <svg width="26" height="26" viewBox="0 0 26 26"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="M16.5 16.5 L22 22" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
        <span class="tab-label">検索</span>
      </button>
      <button class="tab" onclick="switchTab(1)" id="tab-1">
        <svg width="26" height="26" viewBox="0 0 26 26"><circle cx="13" cy="13" r="10" stroke="currentColor" stroke-width="2" fill="none"/><path d="M13 7 L13 13 L17.5 15.5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="tab-label">履歴</span>
      </button>
      <button class="tab" onclick="switchTab(2)" id="tab-2">
        <svg width="26" height="26" viewBox="0 0 26 26"><rect x="2" y="5" width="22" height="16" rx="3" stroke="currentColor" stroke-width="2" fill="none"/><rect x="2" y="9" width="22" height="3.5" fill="currentColor"/></svg>
        <span class="tab-label">カード</span>
      </button>
    </div>

    <!-- =============== station picker sheet =============== -->
    <div class="dim" id="sheet-dim" onclick="closePicker()"></div>
    <div class="sheet" id="station-sheet">
      <div class="grabber"></div>
      <div class="sheet-title" id="picker-title">出発駅を選択</div>
      <div class="searchbar">
        <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="7" cy="7" r="5" stroke="rgba(60,60,67,0.6)" stroke-width="1.6" fill="none"/><path d="M11 11 L14.5 14.5" stroke="rgba(60,60,67,0.6)" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input type="text" id="station-search" placeholder="駅名で検索" oninput="renderStationList()">
      </div>
      <div class="sheet-scroll"><div class="group" id="station-list"></div></div>
    </div>

    <!-- =============== alert =============== -->
    <div class="alert-wrap" id="alert-wrap">
      <div class="alert">
        <div class="a-title" id="alert-title"></div>
        <div class="a-msg" id="alert-msg"></div>
        <input type="number" id="alert-input" style="display:none;" inputmode="decimal">
        <div class="a-btns" id="alert-btns"></div>
      </div>
    </div>

</div>

<script>
/* =========================================================
   data
========================================================= */
const OP_COLORS = {
  "東急":"#DA0442","東京メトロ":"#149DD3","都営地下鉄":"#199B4C",
  "相鉄":"#0A234F","東武":"#0F6CC3","JR東日本":"#2E8B2E"
};
const STATIONS = [
  {name:"三軒茶屋", lines:"東急田園都市線・世田谷線"},
  {name:"表参道",   lines:"東京メトロ銀座線・千代田線・半蔵門線"},
  {name:"九段下",   lines:"東京メトロ東西線・半蔵門線／都営新宿線"},
  {name:"白金高輪", lines:"東京メトロ南北線／都営三田線"},
  {name:"綾瀬",     lines:"東京メトロ千代田線（JR常磐線と改札共用）"},
  {name:"羽沢横浜国大", lines:"相鉄新横浜線（JRと改札共用）"},
  {name:"志村坂上", lines:"都営三田線"},
  {name:"日吉",     lines:"東急東横線・目黒線・新横浜線"},
  {name:"渋谷",     lines:"東急・東京メトロ ほか"},
  {name:"押上",     lines:"東武・都営・東京メトロ・京成"}
];

/* line symbols */
const L = {
  DT:{sym:"DT",name:"田園都市線",color:"#00A040"},
  Z: {sym:"Z", name:"半蔵門線",color:"#8F76D6"},
  G: {sym:"G", name:"銀座線",color:"#F39700"},
  N: {sym:"N", name:"南北線",color:"#00AC9B"},
  S: {sym:"S", name:"都営新宿線",color:"#6CBB5A"},
  I: {sym:"I", name:"都営三田線",color:"#0079C2"},
  C: {sym:"C", name:"千代田線",color:"#00BB85"},
  F: {sym:"F", name:"副都心線",color:"#9C5E31"},
  TY:{sym:"TY",name:"東横線",color:"#DA0442"},
  SH:{sym:"SH",name:"東急新横浜線",color:"#8F1D75"},
  SO:{sym:"SO",name:"相鉄新横浜線",color:"#0A234F"},
  MG:{sym:"MG",name:"目黒線",color:"#009CD2"}
};
const sta = n=>({sta:n});

/* fares: cash=きっぷ, ic=交通系IC, cc=クレカ乗車（推定） */
const ROUTES = {
  "三軒茶屋>表参道":[
    { via:[L.DT, sta("渋谷"), L.Z],
      cash:340, ic:338, cc:360,
      legs:[{op:"東急",sec:"三軒茶屋 → 渋谷",fare:180},{op:"東京メトロ",sec:"渋谷 → 表参道",fare:180}],
      notes:["きっぷ・ICは渋谷駅接続の乗継割引（▲20円）が適用されます。","クレカ乗車はノーラッチ直通でも乗継割引が適用されず、両社の10円単位運賃の単純合算になります。"] },
    { via:[L.DT, sta("渋谷"), L.G],
      cash:340, ic:338, cc:360,
      legs:[{op:"東急",sec:"三軒茶屋 → 渋谷",fare:180},{op:"東京メトロ",sec:"渋谷 → 表参道",fare:180}],
      notes:["渋谷駅は東急とメトロが改札を共用しているため、改札内乗換なら運賃は直通利用と同じです。"] }
  ],
  "九段下>白金高輪":[
    { via:[L.Z, sta("永田町"), L.N],
      cash:210, ic:209, cc:210,
      legs:[{op:"東京メトロ",sec:"九段下 → 白金高輪",fare:210}],
      notes:["経路が特定できない区間のため、IC・クレカとも安いメトロ経由の運賃でみなし計算されます。"] },
    { via:[L.S, sta("神保町"), L.I],
      cash:220, ic:209, cc:210,
      legs:[{op:"東京メトロ",sec:"（みなし）九段下 → 白金高輪",fare:210}],
      notes:["実際に都営線に乗ってもメトロ経由運賃でみなし計算されます。きっぷを買う場合のみ都営運賃220円です。","クレカ乗車210円はきっぷ220円より安くなる区間です。"] }
  ],
  "綾瀬>羽沢横浜国大":[
    { via:[L.C, sta("明治神宮前"), L.F, L.TY, L.SH, sta("新横浜"), L.SO],
      cash:810, ic:803, cc:850,
      legs:[{op:"東京メトロ",sec:"綾瀬 → 渋谷",fare:250},{op:"東急",sec:"渋谷 → 新横浜（新横浜線）",fare:390},{op:"相鉄",sec:"新横浜 → 羽沢横浜国大",fare:210}],
      notes:["綾瀬（JR共用改札）・羽沢横浜国大（JR共用改札）のため、ICは最安のJR経由（803円）でみなし計算されます。","JR東日本はクレカ乗車非対応のため、クレカはメトロ・東急・相鉄経由の運賃になります（IC比 +47円）。","内訳は表示上の概算です。"] }
  ],
  "志村坂上>日吉":[
    { via:[L.I, sta("目黒"), L.MG],
      cash:630, ic:630, cc:630,
      legs:[{op:"都営地下鉄",sec:"志村坂上 → 目黒",fare:380},{op:"東急",sec:"目黒 → 日吉",fare:250}],
      notes:["ICは税抜運賃最安のメトロ経由（630円）でみなし計算。実経路の合算IC627円より3円高くなります。","クレカは10円単位運賃最安の都営目黒経由で計算され、こちらも630円。","3方式ほぼ同額のため、還元がある分クレカが実質最安になる区間です。"] }
  ]
};
function viaHTML(via, from, to){
  const tokens = [{sta:from}, ...via, {sta:to}];
  return tokens.map(t=> t.sta
    ? `<span class="via-sta">${t.sta}</span>`
    : `<span class="line-badge" style="background:${t.color};">${t.sym}</span><span class="via-line">${t.name}</span>`
  ).join(`<span class="via-arrow"> → </span>`);
}
function viaText(via, from, to){
  const tokens = [{sta:from}, ...via, {sta:to}];
  return tokens.map(t=> t.sta ? t.sta : `[${t.sym}]${t.name}`).join(" → ");
}
/* register reverse directions */
Object.keys(ROUTES).forEach(k=>{
  const [a,b]=k.split(">");
  if(!ROUTES[b+">"+a]) ROUTES[b+">"+a]=ROUTES[k];
});

const CARDS = [
  {id:"smcc",  name:"三井住友カード（NL）", rate:8,  grad:"linear-gradient(135deg,#0b5c3e,#12855a)"},
  {id:"smccg", name:"三井住友カード ゴールド（NL）", rate:10, grad:"linear-gradient(135deg,#8a6d1d,#c9a227)"},
  {id:"jcbw",  name:"JCB カード W", rate:5, grad:"linear-gradient(135deg,#123a6b,#1e5fae)"},
  {id:"rkt",   name:"楽天カード", rate:1, grad:"linear-gradient(135deg,#7a0f22,#bf0000)"}
];

/* =========================================================
   state (in-memory only)
========================================================= */
let fromSt=null, toSt=null, pickTarget="from";
let selectedCardId="smcc", customRate=null;
let currentRoutes=[], currentOD=null;
let history=[];
let currentTab=0;

function activeCard(){
  if(customRate!==null) return {name:"カスタム設定", rate:customRate, grad:"linear-gradient(135deg,#3a3a3c,#6e6e73)"};
  return CARDS.find(c=>c.id===selectedCardId);
}
function fmtPt(x){ return (Math.round(x*10)/10).toLocaleString("ja-JP",{maximumFractionDigits:1}); }
function fmtYen(x){ return x.toLocaleString("ja-JP",{maximumFractionDigits:1}); }

/* =========================================================
   navigation
========================================================= */
function switchTab(i){
  currentTab=i;
  ["scr-search","scr-history","scr-cards"].forEach((id,idx)=>{
    document.getElementById(id).classList.toggle("root-active", idx===i);
  });
  for(let t=0;t<3;t++) document.getElementById("tab-"+t).classList.toggle("active", t===i);
  /* pop any pushed screens instantly */
  ["scr-results","scr-detail"].forEach(id=>{
    const s=document.getElementById(id);
    s.classList.remove("in"); s.style.visibility="";
  });
  if(i===1) renderHistory();
  if(i===2) renderCards();
  if(i===0) updateBanner();
}
function pushScreen(id){
  const s=document.getElementById(id);
  s.style.visibility="visible";
  requestAnimationFrame(()=>requestAnimationFrame(()=>s.classList.add("in")));
}
function popScreen(id){
  const s=document.getElementById(id);
  s.classList.remove("in");
  setTimeout(()=>{ s.style.visibility=""; },360);
}

/* large title shrink */
document.getElementById("search-scroll").addEventListener("scroll",function(){
  document.getElementById("search-mini").classList.toggle("show", this.scrollTop>44);
});

/* =========================================================
   station picker
========================================================= */
function openPicker(target){
  pickTarget=target;
  document.getElementById("picker-title").textContent = target==="from"?"出発駅を選択":"到着駅を選択";
  document.getElementById("station-search").value="";
  renderStationList();
  document.getElementById("sheet-dim").classList.add("show");
  document.getElementById("station-sheet").classList.add("show");
}
function closePicker(){
  document.getElementById("sheet-dim").classList.remove("show");
  document.getElementById("station-sheet").classList.remove("show");
}
function renderStationList(){
  const q=document.getElementById("station-search").value.trim();
  const list=document.getElementById("station-list");
  list.innerHTML="";
  STATIONS.filter(s=>!q||s.name.includes(q)).forEach(s=>{
    const b=document.createElement("button");
    b.className="cell st-cell";
    b.innerHTML=`<div style="flex:1;"><div>${s.name}</div><div class="st-lines">${s.lines}</div></div>`+
      (((pickTarget==="from"&&fromSt===s.name)||(pickTarget==="to"&&toSt===s.name))?
        `<svg width="16" height="13" viewBox="0 0 16 13"><path d="M1.5 7 L6 11.5 L14.5 1.5" stroke="#007AFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`:"");
    b.onclick=()=>{ setStation(pickTarget,s.name); closePicker(); };
    list.appendChild(b);
  });
  if(!list.children.length){
    list.innerHTML=`<div class="cell" style="color:var(--label2);cursor:default;">該当する駅がありません</div>`;
  }
}
function setStation(target,name){
  if(target==="from"){ fromSt=name; } else { toSt=name; }
  const el=document.getElementById(target+"-label");
  el.textContent=name; el.classList.remove("placeholder");
  updateSearchBtn();
}
function swapStations(e){
  e.stopPropagation();
  const f=fromSt, t=toSt;
  fromSt=t; toSt=f;
  const fl=document.getElementById("from-label"), tl=document.getElementById("to-label");
  fl.textContent=fromSt||"出発駅"; fl.classList.toggle("placeholder",!fromSt);
  tl.textContent=toSt||"到着駅"; tl.classList.toggle("placeholder",!toSt);
  updateSearchBtn();
}
function quickSet(f,t){ setStation("from",f); setStation("to",t); }
function updateSearchBtn(){
  document.getElementById("search-btn").disabled = !(fromSt&&toSt&&fromSt!==toSt);
}

/* =========================================================
   search & results
========================================================= */
function doSearch(){
  const key=fromSt+">"+toSt;
  const routes=ROUTES[key];
  if(!routes){
    showAlert("未対応の区間です","このプロトタイプでは「対応区間の例」の4区間のみ運賃データを収録しています。",[{label:"OK",bold:true}]);
    return;
  }
  currentRoutes=routes; currentOD={from:fromSt,to:toSt};
  document.getElementById("results-title").textContent=`${fromSt} → ${toSt}`;
  renderResults();
  pushScreen("scr-results");
}
function renderResults(){
  const card=activeCard();
  const body=document.getElementById("results-body");
  body.innerHTML=`<div class="section-header" style="padding-top:4px;">経路候補 ${currentRoutes.length}件 ・ ${card.name}（${card.rate}%）で計算</div>`;
  currentRoutes.forEach((r,i)=>{
    const pt=r.cc*card.rate/100, net=r.cc-pt, diff=r.ic-net;
    const good=diff>0;
    const actual = r.cc<r.ic ? "クレカが最安" : (r.cc===r.ic ? "IC・クレカ同額" : "ICが最安");
    const netBest = diff>0 ? "クレカ" : (diff===0 ? "IC・クレカ（同額）" : "IC");
    const el=document.createElement("button");
    el.className="route-card";
    el.innerHTML=`
      <div class="rc-top"><div class="rc-via">${viaHTML(r.via, currentOD.from, currentOD.to)}</div></div>
      <div class="rc-fares">
        <div class="fare-pill">きっぷ <b>${r.cash}円</b></div>
        <div class="fare-pill">IC <b>${r.ic}円</b></div>
        <div class="fare-pill cc">クレカ <b>${r.cc}円</b> ＋${fmtPt(pt)}pt</div>
      </div>
      <div class="rc-best">
        <div class="rb-actual">支払額：${actual}</div>
        <div class="rb-net ${good?"good":"bad"}">
          <svg width="13" height="13" viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="6" fill="currentColor" opacity=".18"/><path d="M3.5 6.8 L5.7 9 L9.6 4.4" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          ポイント還元も含めた実質料金は${netBest}が最安
        </div>
      </div>`;
    el.onclick=()=>openDetail(i);
    body.appendChild(el);
  });
}

/* =========================================================
   detail
========================================================= */
function openDetail(i){
  const r=currentRoutes[i], card=activeCard();
  const pt=r.cc*card.rate/100, net=r.cc-pt, diff=r.ic-net, good=diff>=0;
  const body=document.getElementById("detail-body");
  const actual = r.cc<r.ic ? "クレカが最安" : (r.cc===r.ic ? "IC・クレカ同額" : "ICが最安");
  const netBest = diff>0 ? "クレカ" : (diff===0 ? "IC・クレカ（同額）" : "IC");
  body.innerHTML=`
    <div style="padding:4px 4px 12px 4px;">
      <div style="font-size:22px;font-weight:700;">${currentOD.from} → ${currentOD.to}</div>
      <div style="font-size:14px;color:var(--label);margin-top:4px;line-height:1.7;">${viaHTML(r.via, currentOD.from, currentOD.to)}</div>
    </div>
    <div class="verdict ${good?"good":"bad"}">
      <svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="currentColor" opacity=".2"/><path d="M6 11.5 L9.5 15 L16 7.5" stroke="${good?"#1d7c3a":"#b36a00"}" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="v-text">支払額：${actual}
        <span class="v-sub">ポイント還元も含めた実質料金は${netBest}が最安${diff>0?`（ICより ${fmtYen(diff)}円 お得）`:diff<0?`（クレカは実質 ${fmtYen(-diff)}円 割高）`:""}</span>
      </div>
    </div>
    <div class="section-header">運賃比較</div>
    <div class="group">
      <div class="fare-row"><div class="fr-line"><div class="fr-name">現金（きっぷ）</div><div class="fr-amount">${r.cash}円</div></div></div>
      <div class="fare-row"><div class="fr-line"><div class="fr-name">交通系IC</div><div class="fr-amount">${r.ic}円</div></div></div>
      <div class="fare-row cc-row">
        <div class="fr-line"><div class="fr-name">クレカ乗車</div><div class="fr-amount">${r.cc}円</div></div>
        <div class="pt-line">
          <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6.5" fill="#34C759"/><path d="M7 3.5 L7 10.5 M3.5 7 L10.5 7" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
          ${fmtPt(pt)}pt 獲得 <span class="pt-sub">（${card.name}・${card.rate}%）</span>
        </div>
        <div class="net-line">実質負担 <b>${fmtYen(net)}円</b></div>
      </div>
    </div>
    <div class="section-header">クレカ乗車運賃の内訳（推定）</div>
    <div class="group">
      ${r.legs.map(l=>`<div class="leg-cell"><span class="op-badge" style="background:${OP_COLORS[l.op]||"#8E8E93"};">${l.op}</span><span class="leg-sec">${l.sec}</span><span class="leg-fare">${l.fare}円</span></div>`).join("")}
    </div>
    <div class="footnote">${r.notes.map(n=>"・"+n).join("<br>")}</div>`;
  history.unshift({from:currentOD.from,to:currentOD.to,via:viaText(r.via, currentOD.from, currentOD.to),cc:r.cc,pt:pt,card:card.name});
  if(history.length>30) history.pop();
  pushScreen("scr-detail");
}

/* =========================================================
   history
========================================================= */
function renderHistory(){
  const c=document.getElementById("history-content");
  if(!history.length){
    c.innerHTML=`<div class="empty">
      <svg width="56" height="56" viewBox="0 0 56 56"><circle cx="28" cy="28" r="24" stroke="#C7C7CC" stroke-width="3" fill="none"/><path d="M28 14 L28 28 L38 34" stroke="#C7C7CC" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="e-title">履歴はまだありません</div>
      <div class="e-msg">検索タブから経路を調べて詳細を開くと、ここに記録されます。</div>
    </div>`;
    return;
  }
  c.innerHTML=`<div class="section-header">最近見た経路</div><div class="group">`+
    history.map(h=>`
      <div class="cell" style="cursor:default;">
        <div style="flex:1;">
          <div class="hist-main">${h.from} → ${h.to}</div>
          <div class="hist-sub">${h.via}</div>
        </div>
        <div class="hist-pt">
          <div class="hist-fare">${h.cc}円</div>
          <div class="hist-ptv">＋${fmtPt(h.pt)}pt</div>
        </div>
      </div>`).join("")+`</div>
    <div class="footnote">履歴はこのプロトタイプではメモリ内にのみ保持され、リロードで消えます。</div>`;
}

/* =========================================================
   cards
========================================================= */
function renderCards(){
  const list=document.getElementById("card-list");
  list.innerHTML="";
  CARDS.forEach(c=>{
    const sel=(customRate===null && selectedCardId===c.id);
    const b=document.createElement("button");
    b.className="cell";
    b.innerHTML=`<div class="card-icon" style="background:${c.grad};"></div>
      <div style="flex:1;"><div>${c.name}</div><div style="font-size:12px;color:var(--label2);">タッチ決済乗車 ${c.rate}%還元</div></div>
      <div class="rate-badge">${sel?`<svg width="18" height="14" viewBox="0 0 18 14"><path d="M2 7.5 L7 12.5 L16 1.5" stroke="#007AFF" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}</div>`;
    b.onclick=()=>{ selectedCardId=c.id; customRate=null; renderCards(); updateBanner(); };
    list.appendChild(b);
  });
  if(customRate!==null){
    const b=document.createElement("button");
    b.className="cell";
    b.innerHTML=`<div class="card-icon" style="background:linear-gradient(135deg,#3a3a3c,#6e6e73);"></div>
      <div style="flex:1;"><div>カスタム設定</div><div style="font-size:12px;color:var(--label2);">還元率 ${customRate}%</div></div>
      <div class="rate-badge"><svg width="18" height="14" viewBox="0 0 18 14"><path d="M2 7.5 L7 12.5 L16 1.5" stroke="#007AFF" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    list.appendChild(b);
  }
}
function openCustomRate(){
  showAlert("還元率を入力","このカードのタッチ決済乗車還元率（%）を入力してください。",
    [{label:"キャンセル"},{label:"設定",bold:true,onTap:()=>{
      const v=parseFloat(document.getElementById("alert-input").value);
      if(!isNaN(v)&&v>=0&&v<=100){ customRate=v; renderCards(); updateBanner(); }
    }}], true);
}
function updateBanner(){
  const c=activeCard();
  document.getElementById("banner-card-name").textContent=c.name;
  document.getElementById("banner-card-rate").textContent=`タッチ決済乗車 ${c.rate}%還元`;
  document.getElementById("banner-card-icon").style.background=c.grad;
}

/* =========================================================
   alert
========================================================= */
function showAlert(title,msg,btns,withInput){
  document.getElementById("alert-title").textContent=title;
  document.getElementById("alert-msg").textContent=msg;
  const input=document.getElementById("alert-input");
  input.style.display=withInput?"block":"none"; input.value="";
  const bt=document.getElementById("alert-btns");
  bt.innerHTML="";
  (btns||[{label:"OK",bold:true}]).forEach(b=>{
    const e=document.createElement("button");
    e.className="a-btn"+(b.bold?" bold":"");
    e.textContent=b.label;
    e.onclick=()=>{ document.getElementById("alert-wrap").classList.remove("show"); if(b.onTap)b.onTap(); };
    bt.appendChild(e);
  });
  document.getElementById("alert-wrap").classList.add("show");
  if(withInput) setTimeout(()=>input.focus(),100);
}

/* init */
updateBanner();
renderCards();
</script>
</body>
</html>
